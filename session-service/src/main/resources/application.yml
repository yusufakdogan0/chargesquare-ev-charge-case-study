spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: session-service

  # ── Database ──
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:chargesquare}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: session
    open-in-view: false

  # ── Flyway ──
  flyway:
    schemas: session
    default-schema: session

# ── Server ──
server:
  port: ${SERVER_PORT:8082}

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# ── Swagger / OpenAPI ──
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ── JWT ──
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

# ── Logging ──
logging:
  level:
    com.yusufakdogan.session_service: DEBUG
    org.springframework.web: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Station Service ──
station:
  service:
    url: ${STATION_SERVICE_URL:http://localhost:8081}

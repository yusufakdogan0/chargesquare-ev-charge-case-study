# This manifest deploys the station-service application.
# It uses the locally built Docker image and exposes the service internally via a ClusterIP.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: station-service
  labels:
    app: station-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: station-service
  template:
    metadata:
      labels:
        app: station-service
    spec:
      containers:
        - name: station-service
          image: station-service:latest
          imagePullPolicy: Never # Forces Kubernetes to use the local image instead of pulling from a registry
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/chargesquare"
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: chargesquare-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              value: "PLACEHOLDER_CHANGE_ME" # Placeholder since Secrets are not used
            - name: JWT_SECRET
              value: "PLACEHOLDER_CHANGE_ME" # Placeholder since Secrets are not used
---
# The Service exposes station-service internally to the other pods.
# Port forwarding can be used to access this externally.
apiVersion: v1
kind: Service
metadata:
  name: station-service
  labels:
    app: station-service
spec:
  type: ClusterIP # Uses ClusterIP as it is not required to be exposed externally
  selector:
    app: station-service
  ports:
    - port: 8081
      targetPort: 8081

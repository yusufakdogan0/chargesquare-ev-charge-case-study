name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: dummy_secret_for_testing_purposes_only_which_must_be_long_enough

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and test station-service
        run: |
          cd station-service
          chmod +x ./gradlew
          ./gradlew build

      - name: Build and test session-service
        run: |
          cd session-service
          chmod +x ./gradlew
          ./gradlew build

      - name: Build station-service Docker image
        run: |
          cd station-service
          docker build -t station-service:latest .

      - name: Build session-service Docker image
        run: |
          cd session-service
          docker build -t session-service:latest .

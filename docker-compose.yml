version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chargesquare-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chargesquare}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-chargesquare}"]
      interval: 5s
      timeout: 5s
      retries: 5

  station-service:
    build:
      context: ./station-service
      dockerfile: Dockerfile
    container_name: chargesquare-station-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chargesquare}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

  session-service:
    build:
      context: ./session-service
      dockerfile: Dockerfile
    container_name: chargesquare-session-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chargesquare}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600000}
      - STATION_SERVICE_URL=http://station-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      station-service:
        condition: service_started
    env_file:
      - .env

volumes:
  postgres_data:
